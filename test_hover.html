<!DOCTYPE html>
<html>
<head>
  <style>
    .cell { width: 100px; height: 100px; border: 1px solid black; position: relative; }
    .label { position: absolute; bottom: 2px; width: 100%; height: 30px; background: red; }
    .tooltip { position: fixed; background: yellow; pointer-events: none; }
  </style>
</head>
<body>
  <div class="cell" id="c1">
    <div class="label">Holiday</div>
  </div>
  <script>
    const cell = document.getElementById('c1');
    cell.addEventListener('mouseenter', (e) => {
      console.log('mouseenter', e.target.className);
      const t = document.createElement('div');
      t.className = 'tooltip'; t.id = 'tt'; t.innerText = 'Tooltip';
      document.body.appendChild(t);
    });
    cell.addEventListener('mouseleave', (e) => {
      console.log('mouseleave', e.target.className);
      const t = document.getElementById('tt');
      if (t) t.remove();
    });
  </script>
</body>
</html>
